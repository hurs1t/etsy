<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f1641e",
                        "background-light": "#f8f6f5",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            width: 350px;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e6dfdb;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
<div class="flex flex-col h-auto min-h-[500px] w-full border border-slate-200 dark:border-slate-800 shadow-xl overflow-hidden">
<!-- Header Section -->
<header class="flex items-center justify-between bg-white dark:bg-slate-900 px-4 py-4 border-b border-slate-100 dark:border-slate-800">

</div>
<h1 class="text-slate-900 dark:text-white text-lg font-bold tracking-tight">EtsySync</h1>
</div>
<div class="flex items-center gap-1.5 px-2.5 py-1 bg-green-50 dark:bg-green-900/20 border border-green-100 dark:border-green-800 rounded-full">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
</span>
<span class="text-[10px] font-bold text-green-700 dark:text-green-400 uppercase tracking-wider">Connected</span>

</div>

<div class="flex items-center gap-1.5 mt-1">
<span class="text-primary font-bold text-sm">$24.99</span>
<span class="text-slate-400 text-[10px]">AliExpress Official</span>
</div>
</div>
</div>
</div>
<!-- Main Action Area -->
<div class="flex flex-col gap-3">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined">auto_awesome</span>
<span>Generate AI Listing</span>
</button>
<a class="flex items-center justify-center gap-1.5 text-slate-500 dark:text-slate-400 text-xs font-medium hover:text-primary dark:hover:text-primary transition-colors py-1" href="#">
<span>Go to Dashboard</span>
<span class="material-symbols-outlined text-[14px]">open_in_new</span>
</a>
</div>
<!-- Usage Tracker -->
<div class="mt-auto pt-4 border-t border-slate-200 dark:border-slate-800 flex flex-col gap-3">
<div class="flex items-center justify-between text-xs">
<span class="text-slate-500 dark:text-slate-400 font-medium">Monthly Usage</span>
<span class="text-slate-900 dark:text-white font-bold">12 <span class="text-slate-400 font-normal">/ 100</span></span>
</div>
<div class="h-2 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 12%;"></div>
</div>
<p class="text-[10px] text-slate-400 dark:text-slate-500 text-center leading-relaxed">
                    You have <span class="font-bold text-slate-600 dark:text-slate-300">88</span> imports remaining for this cycle.
                </p>
</div>

</div>
<div class="flex flex-col">
<span class="text-xs font-bold text-slate-700 dark:text-slate-200">Alex Thompson</span>
<span class="text-[10px] text-slate-400">Pro Plan</span>
</div>
</div>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined text-lg">settings</span>
</button>
</footer>
</div>
