<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f1641e",
                        "background-light": "#f8f6f5",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .ali-container-mock {
            background-color: #fff;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen relative">
<!-- AliExpress Product Page Mockup (Background Context) -->
<div class="ali-container-mock opacity-40 pointer-events-none select-none">
<div class="flex flex-col md:flex-row gap-8">
<div class="w-full md:w-1/2 aspect-square bg-slate-200 rounded-lg" data-alt="AliExpress product image placeholder"></div>
<div class="w-full md:w-1/2 space-y-4">
<div class="h-8 bg-slate-200 w-3/4 rounded"></div>
<div class="h-4 bg-slate-200 w-1/2 rounded"></div>
<div class="h-10 bg-slate-100 w-1/3 rounded mt-8"></div>
<div class="space-y-2 pt-10">
<div class="h-12 bg-slate-300 w-full rounded"></div>
<div class="h-12 border-2 border-slate-200 w-full rounded"></div>
</div>
</div>
</div>
</div>
<!-- 1. Floating Action Badge (FAB) - Bottom Right -->
<div class="fixed bottom-6 right-6 z-[9999] flex flex-col items-end gap-3">
<!-- Status Tooltip (Appears above FAB) -->
<div class="bg-white dark:bg-slate-800 shadow-xl rounded-lg border border-slate-200 dark:border-slate-700 p-3 flex items-center gap-3 animate-in fade-in slide-in-from-bottom-2 duration-300">
<div class="flex h-2 w-2 relative">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
</div>
<span class="text-sm font-medium text-slate-700 dark:text-slate-200">Product data detected</span>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined text-[18px]">close</span>
</button>
</div>
<!-- Main FAB Trigger -->
<button class="group relative flex h-14 w-14 items-center justify-center rounded-xl bg-primary shadow-lg shadow-primary/30 hover:shadow-primary/40 transition-all active:scale-95">
<div class="absolute -top-1 -right-1 bg-white dark:bg-slate-900 rounded-full p-0.5">
<span class="material-symbols-outlined text-green-500 text-[16px] font-bold">check_circle</span>
</div>
<svg class="w-8 h-8 text-white" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M24 0.757355L47.2426 24L24 47.2426L0.757355 24L24 0.757355ZM21 35.7574V12.2426L9.24264 24L21 35.7574Z" fill="currentColor" fill-rule="evenodd"></path>
</svg>
<!-- Hover Label -->
<span class="absolute right-full mr-4 px-3 py-1.5 bg-slate-900 text-white text-xs font-bold rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Open EtsySync Panel</span>
</button>
</div>
<!-- 2. Contextually Injected Action Section (Near Buy Buttons) -->
<!-- Positioned absolutely to simulate "injection" in the design layout -->
<div class="absolute top-[340px] left-[50%] ml-[20px] w-[500px] z-[999]">
<div class="bg-white dark:bg-slate-900 border-2 border-primary/20 rounded-xl p-4 shadow-sm space-y-3">
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="p-1 bg-primary/10 rounded">
<svg class="w-4 h-4 text-primary" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M24 0.757355L47.2426 24L24 47.2426L0.757355 24L24 0.757355ZM21 35.7574V12.2426L9.24264 24L21 35.7574Z" fill="currentColor" fill-rule="evenodd"></path>
</svg>
</div>
<span class="text-xs font-bold text-primary tracking-wider uppercase">Ready to Sync</span>
</div>
<div class="flex items-center gap-1.5 text-[11px] text-slate-500 font-medium">
<span class="material-symbols-outlined text-[14px]">store</span>
<span>Target: MyHandmadeStore</span>
</div>
</div>
<div class="flex gap-2">
<button class="flex-1 flex items-center justify-center gap-2 bg-primary hover:bg-primary/90 text-white font-bold py-3.5 px-6 rounded-lg transition-colors shadow-md shadow-primary/20">
<span class="material-symbols-outlined text-[20px]">cloud_upload</span>
<span>Quick Import to Etsy</span>
</button>
<button class="bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 p-3 rounded-lg transition-colors border border-slate-200 dark:border-slate-700">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300">settings</span>
</button>
</div>
<div class="flex items-center gap-4 text-[10px] text-slate-400 font-medium px-1">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[12px] text-green-500">check</span>
<span>High-Res Images Found</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[12px] text-green-500">check</span>
<span>Shipping Data Parsed</span>
</div>
</div>
</div>
</div>
<!-- 3. Mini Settings Pop-out (Usually hidden, shown for demo) -->
<div class="fixed bottom-24 right-6 w-72 z-[9998] bg-white dark:bg-slate-900 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 overflow-hidden hidden group-focus-within:block">
<div class="p-4 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
<h3 class="font-bold text-sm">EtsySync Settings</h3>
<span class="material-symbols-outlined text-slate-400 text-[18px] cursor-pointer">close</span>
</div>
<div class="p-4 space-y-4">
<div class="space-y-1.5">
<label class="text-[11px] font-bold text-slate-500 uppercase">Pricing Rules</label>
<div class="flex items-center justify-between p-2 bg-background-light dark:bg-background-dark rounded border border-slate-200 dark:border-slate-700">
<span class="text-xs">Automatic Markup (2.5x)</span>
<div class="w-8 h-4 bg-primary rounded-full relative">
<div class="absolute right-0.5 top-0.5 w-3 h-3 bg-white rounded-full"></div>
</div>
</div>
</div>
<div class="space-y-1.5">
<label class="text-[11px] font-bold text-slate-500 uppercase">Image Handling</label>
<div class="flex items-center justify-between p-2 bg-background-light dark:bg-background-dark rounded border border-slate-200 dark:border-slate-700">
<span class="text-xs">Remove Watermarks</span>
<div class="w-8 h-4 bg-slate-300 dark:bg-slate-600 rounded-full relative">
<div class="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full"></div>
</div>
</div>
</div>
</div>
<div class="p-3 bg-slate-50 dark:bg-slate-800/50 flex justify-center">
<button class="text-[11px] font-bold text-primary hover:underline">View All Extension Settings</button>
</div>
</div>
<!-- Background Decoration to simulate AliExpress UI -->
<div class="absolute top-4 left-4 flex items-center gap-4 opacity-10 pointer-events-none">
<div class="w-24 h-6 bg-slate-400 rounded"></div>
<div class="w-64 h-8 bg-slate-300 rounded-full"></div>
</div>
</body></html>
