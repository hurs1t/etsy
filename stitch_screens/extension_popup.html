<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EtsySync Extension</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f1641e",
                        "background-light": "#f8f6f5",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            width: 380px;
            height: auto;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display antialiased">
<div class="flex flex-col min-h-screen">
<!-- Header Section -->
<header class="flex items-center justify-between bg-white dark:bg-background-dark/50 border-b border-slate-200 dark:border-slate-800 px-4 py-3 sticky top-0 z-10">
<div class="flex items-center gap-2">
<div class="flex items-center justify-center bg-primary rounded-lg p-1.5 text-white">
<span class="material-symbols-outlined !text-[20px]">sync_alt</span>
</div>
<h1 class="text-slate-900 dark:text-white font-bold text-base tracking-tight">EtsySync</h1>
</div>
<div class="flex items-center gap-1.5 bg-emerald-50 dark:bg-emerald-500/10 px-2 py-1 rounded-full border border-emerald-100 dark:border-emerald-500/20">
<span class="flex h-2 w-2 rounded-full bg-emerald-500"></span>
<span class="text-[11px] font-semibold text-emerald-700 dark:text-emerald-400 uppercase tracking-wider">Connected</span>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 p-4 space-y-4">
<!-- Product Detection Card -->
<div class="bg-white dark:bg-background-dark/30 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden shadow-sm">
<div class="p-1 text-[10px] font-medium text-slate-400 dark:text-slate-500 uppercase px-3 pt-3 flex items-center gap-1">
<span class="material-symbols-outlined !text-[12px]">search</span>
                    Detected Product
                </div>
<div class="p-3 flex gap-3">
<div class="relative h-20 w-20 flex-shrink-0 rounded-lg overflow-hidden border border-slate-100 dark:border-slate-800">
<img alt="Product" class="h-full w-full object-cover" data-alt="Modern white minimalist ceramic coffee mug" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAE5xZ1dbLPV4KPAGTSNaDc4ZjScnu6QnETTAAkBs5N1cp6Rc-r1AbJEOjsIffAYqVBrgrSxmoKwvzjlsGrTvLJpLexC-FLOuZsk7QzI8Zd2sjmPiJGRQg_OKwOswz7SjpH31f9ZkYtJ2e9gng9six9DUxlHLe2q0gQ5F1v9eCH1xjDaeR74LoYRo4rz23XFx2ETlIizVXSjBao8tIfZDApJ7dlQmNvaUPNuw9LQYFderbskmUqAW6YRTuTuPF7WzPr54poGx44RuoX"/>
</div>
<div class="flex flex-col justify-between py-0.5">
<div class="space-y-1">
<h3 class="text-sm font-semibold text-slate-900 dark:text-white line-clamp-2 leading-snug">
                                Premium Ceramic Coffee Mug - Minimalist Nordic Design
                            </h3>
<p class="text-primary font-bold text-base">$14.50</p>
</div>
<div class="flex items-center gap-1 text-[11px] text-slate-500">
<span class="material-symbols-outlined !text-[14px]">store</span>
                            AliExpress Store
                        </div>
</div>
</div>
</div>
<!-- Primary Action -->
<button class="w-full flex items-center justify-center gap-2 bg-primary hover:bg-primary/90 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined !text-[20px]">magic_button</span>
<span>Generate AI Listing</span>
</button>
<!-- Usage Progress Section -->
<div class="bg-white dark:bg-background-dark/30 border border-slate-200 dark:border-slate-800 rounded-xl p-4 space-y-3">
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-slate-400 !text-[18px]">bar_chart</span>
<span class="text-xs font-semibold text-slate-600 dark:text-slate-400">Monthly Usage</span>
</div>
<span class="text-xs font-bold text-slate-900 dark:text-white">12 / 100</span>
</div>
<div class="w-full bg-slate-100 dark:bg-slate-800 h-2 rounded-full overflow-hidden">
<div class="bg-primary h-full w-[12%] rounded-full"></div>
</div>
<p class="text-[11px] text-slate-500 text-center">
                    You have <span class="font-semibold text-slate-700 dark:text-slate-300">88</span> imports left this period.
                </p>
</div>
</main>
<!-- Footer Section -->
<footer class="bg-white dark:bg-background-dark/50 border-t border-slate-200 dark:border-slate-800 px-4 py-3 mt-auto">
<div class="flex items-center justify-between">
<div class="flex items-center gap-2.5">
<div class="h-8 w-8 rounded-full overflow-hidden border-2 border-primary/20">
<img alt="User" class="h-full w-full object-cover" data-alt="Professional male portrait for profile avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAIQWz4hn-WYRcCPwuMdMU-OvdzLDzQVJ-mpFZU8bhVV0nX1nbLgpFbESEmUuiSjpkWTEy1IrN1xv2NqXdE93c0ql-LA8AS392NjBjtumXHoBdnZGJ6M0wZs-hrxtRZ_3oxuZm18A6xfy09B7c7XFYd8Ep86bDI2_S1HM9vJSIbyGFPsl4bB0np0luzcx91l1U7mhLSpG4NV0kYM8sSFnxjy5X2UzJ86vVDLU-i3OXbCTgEUTawQsOGNvZBsVVEgHXKsM-QpZkcY-M0"/>
</div>
<div class="flex flex-col">
<span class="text-xs font-bold text-slate-900 dark:text-white leading-tight">Alex Thompson</span>
<span class="text-[10px] text-slate-500 font-medium">Pro Plan</span>
</div>
</div>
<button class="p-2 text-slate-400 hover:text-primary hover:bg-primary/5 rounded-lg transition-colors">
<span class="material-symbols-outlined !text-[22px]">settings</span>
</button>
</div>
</footer>
</div>
</body></html>
